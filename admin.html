<aside class="dash-side">
  <div class="who"><div class="avatar" id="av">A</div><div><div class="nm" id="nm">Admin</div><div class="rl">ADMINISTRATOR</div></div></div>

<script src="https://checkout.flutterwave.com/v3.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="app.js"></script><script src="script.js"></script>
<script>
const me = Auth.require(["admin"]);
if(me){
  document.getElementById("nm").textContent = me.name;
  document.getElementById("av").textContent = me.name[0].toUpperCase();
}
const tabs = document.querySelectorAll(".tab");
tabs.forEach(t=>t.addEventListener("click",e=>{
  e.preventDefault();
  tabs.forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  render(t.dataset.tab);
}));

function pill(s){return `<span class="status-pill status-${s==='paid'||s==='Admitted'||s==='active'?'paid':s==='suspended'||s==='Rejected'?'fail':'pending'}">${s}</span>`;}

function render(tab){
  const m = document.getElementById("main");
  if(tab==="overview") return renderOverview(m);
  if(tab==="screening") return renderScreening(m);
  if(tab==="students") return renderStudents(m);
  if(tab==="fees") return renderFees(m);
  if(tab==="progfees") return renderProgFees(m);
  if(tab==="invoices") return renderInvoices(m);
  if(tab==="courses") return renderCourses(m);
  if(tab==="gallery") return renderGallery(m);
  if(tab==="notices") return renderNotices(m);
  if(tab==="reports") return renderReports(m);
  if(tab==="payments") return renderPayments(m);
  if(tab==="settings") return renderSettings(m);
}

function renderOverview(m){
  const users = DB.users, pays = DB.payments, scr = DB.screenings;
  const admitted = users.filter(u=>u.matric);
  const paid = users.filter(u=>pays.some(p=>p.userId===u.id && p.status==='paid'));
  const revenue = pays.filter(p=>p.status==='paid').reduce((s,p)=>s+p.amount,0);
  m.innerHTML = `<section class="panel">
    <h2>Admin Dashboard</h2>
    <div class="sub">Overview of activity across the portal. <em>Click any box to see the details.</em></div>
    <div class="kv">
      <div class="item clickable" data-go="screening"><div class="k">Total Applicants</div><div class="v">${scr.length}</div></div>
      <div class="item clickable" data-go="students"><div class="k">Total Students</div><div class="v">${users.filter(u=>u.role!=='admin').length}</div></div>
      <div class="item clickable" data-go="students"><div class="k">Admitted (with Matric)</div><div class="v">${admitted.length}</div></div>
      <div class="item clickable" data-go="payments"><div class="k">Paid Students</div><div class="v">${paid.length}</div></div>
      <div class="item clickable" data-go="payments"><div class="k">Successful Payments</div><div class="v">${pays.filter(p=>p.status==='paid').length}</div></div>
      <div class="item clickable" data-go="payments"><div class="k">Total Revenue</div><div class="v">₦${revenue.toLocaleString()}</div></div>
    </div>
  </section>`;
  m.querySelectorAll(".item.clickable").forEach(el=>{
    el.addEventListener("click", ()=>{
      const tab = el.getAttribute("data-go");
      const link = document.querySelector('.tab[data-tab="'+tab+'"]');
      if(link) link.click();
    });
  });
}

function renderScreening(m){
  // Sort pending applications first so admin always sees & can act on
  // every awaiting student — not just the first one in the list.
  const all = (DB.screenings||[]).slice();
  const isPending = (s)=> /Awaiting Admin Approval/i.test(s.status||"");
  all.sort((a,b)=>{
    const pa = isPending(a)?0:1, pb = isPending(b)?0:1;
    if(pa!==pb) return pa-pb;
    return (b.submittedAt||0) - (a.submittedAt||0);
  });
  const list = all;
  const pendingCount = list.filter(isPending).length;
  m.innerHTML = `<section class="panel"><h2>Screening Applications</h2>
    <div class="sub">Approve to auto-create a student account + matric number, or reject. <strong>${pendingCount}</strong> awaiting approval.</div>
    <table class="tbl"><thead><tr><th>Date</th><th>Name</th><th>JAMB</th><th>Course</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${list.map(s=>{
      const pend = isPending(s);
      const sid = String(s.id||"").replace(/"/g,'&quot;');
      return `<tr${pend?' style="background:#fffbe6"':''}>
      <td>${new Date(s.submittedAt).toLocaleDateString()}</td>
      <td>${s.name}</td><td>${s.jamb}</td><td>${s.course||"—"}</td><td>${s.phone}</td>
      <td>${pill(s.status)}</td>
      <td>
        ${pend?`<button class="btn btn-green" style="padding:4px 10px;font-size:12px" data-act="approve" data-id="${sid}">Approve</button>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px;color:#b91c1c" data-act="reject" data-id="${sid}">Reject</button>`:''}
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" data-act="slip" data-id="${sid}">Slip</button>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" data-act="docs" data-id="${sid}">Docs</button>
      </td></tr>`;
    }).join("")||'<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">No applications yet.</td></tr>'}</tbody></table>
  </section>`;
  // Event delegation — works for every row regardless of how many
  // students are pending, and is immune to weird chars in IDs.
  m.querySelectorAll("button[data-act]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.getAttribute("data-id");
      const act = btn.getAttribute("data-act");
      if(act==="approve") return window.approveScr(id);
      if(act==="reject")  return window.rejectScr(id);
      if(act==="slip")    return window.reprintScr(id);
      if(act==="docs")    return window.viewScrDocs(id);
    });
  });
}
window.approveScr = async (id)=>{
  try{
    const res = await adminApproveScreening(id);
    toast("✓ Approved. Acceptance Fee invoice created for "+(res.user?.name||"applicant")+".");
    render("screening");
  }catch(e){
    console.error("Approve error:", e);
    alert("Could not approve:\n\n"+(e?.message||e));
  }
};
window.rejectScr = (id)=>{
  const reason = prompt("Reason for decline (shown to applicant):","YOUR ADMISSION IS NOT ACCEPTED");

  if(reason===null) return;
  adminDeclineScreening(id, reason);
  toast("Application declined."); render("screening");
};
window.reprintScr = (id)=>{ const s = DB.screenings.find(x=>x.id===id); if(s) printScreeningSlip(s); };
window.viewScrDocs = (id)=>{
  const s = (DB.screenings||[]).find(x=>x.id===id); if(!s) return;
  const docs = [
    ["Passport Photo", s.passport],
    ["Birth Certificate", s.docBirth],
    ["O'Level Result", s.docOlevel],
    ["JAMB Result", s.docJamb],
    ["ND Result (HND)", s.docND],
  ];
  const filenameFor = (label, key)=> (s.name||"applicant").replace(/\s+/g,"_")+"_"+label.replace(/[^\w]+/g,"_")+_extFromKey(key);
  function _extFromKey(k){ const src = Assets.get(k)||""; const m = /^data:([^;]+)/.exec(src); if(!m) return ""; const t=m[1]; if(/pdf/.test(t)) return ".pdf"; if(/png/.test(t)) return ".png"; if(/jpeg|jpg/.test(t)) return ".jpg"; return ""; }
  const old = document.getElementById("docsModal"); if(old) old.remove();
  const m = document.createElement("div");
  m.id = "docsModal";
  m.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;z-index:9999;padding:24px;overflow:auto";
  m.innerHTML = `
    <div style="background:#fff;border-radius:14px;max-width:820px;width:100%;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.4);font-family:inherit">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:10px;margin-bottom:14px">
        <div><h2 style="margin:0;color:#15532a">Uploaded Documents</h2>
          <div class="sub" style="color:var(--muted);font-size:13px">${s.name||""} · ${s.jamb||s.id} · ${s.course||""}</div></div>
        <button id="docsClose" class="btn btn-ghost" style="padding:6px 12px">✕ Close</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">
      ${docs.map(([label,key])=>{
        const src = key ? Assets.get(key) : null;
        if(!src) return `<div style="border:1px dashed #cfd8d3;border-radius:10px;padding:14px;text-align:center;color:#888;font-size:13px"><strong>${label}</strong><br/><span style="font-size:11px">Not uploaded</span></div>`;
        const isPdf = /^data:application\/pdf/.test(src);
        const preview = isPdf
          ? `<div style="background:#f4f7f4;border-radius:8px;height:140px;display:flex;align-items:center;justify-content:center;font-size:38px">📄</div>`
          : `<img src="${src}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;background:#f4f7f4"/>`;
        const fname = filenameFor(label, key);
        return `<div style="border:1px solid var(--border);border-radius:10px;padding:10px;background:#fff">
          ${preview}
          <div style="font-size:13px;font-weight:600;margin:8px 0 6px">${label}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <a href="${src}" target="_blank" class="btn btn-ghost" style="padding:4px 10px;font-size:12px">View</a>
            <a href="${src}" download="${fname}" class="btn btn-green" style="padding:4px 10px;font-size:12px">Download</a>
          </div>
        </div>`;
      }).join("")}
      </div>
    </div>`;
  document.body.appendChild(m);
  document.getElementById("docsClose").onclick = ()=> m.remove();
  m.addEventListener("click",(ev)=>{ if(ev.target===m) m.remove(); });
};

function renderStudents(m){
  const users = DB.users.filter(u=>u.role!=='admin');
  m.innerHTML = `<section class="panel"><h2>Students</h2>
    <div class="sub">View, suspend, reset password.</div>
    <table class="tbl"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Matric</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${users.map(u=>`<tr>
      <td>${u.name}</td><td>${u.email}</td><td>${u.role}</td>
      <td style="font-family:monospace;font-size:12px">${u.matric||"—"}</td>
      <td>${pill(u.status||"active")}</td>
      <td>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick='toggleSuspend("${u.id}")'>${(u.status==="suspended")?"Activate":"Suspend"}</button>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick='resetPwd("${u.id}")'>Reset Pwd</button>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick='viewBio("${u.id}")'>Bio</button>
      </td></tr>`).join("")}</tbody></table>
  </section>`;
}
window.toggleSuspend=(id)=>{const u=DB.users;const x=u.find(z=>z.id===id);x.status=(x.status==="suspended"?"active":"suspended");DB.users=u;render("students");};
window.resetPwd=async (id)=>{
  const u=DB.users;const x=u.find(z=>z.id===id);
  const np="OCP"+Math.random().toString(36).slice(2,8);
  x.password=await hashPassword(np);x.mustChangePwd=true;DB.users=u;
  const subj = encodeURIComponent("[OCPOTECH] Password Reset");
  const body = encodeURIComponent(`Hello ${x.name},\n\nYour password has been reset by the admin.\nTemporary password: ${np}\nPlease login and change it.\n\n— OCPOTECH ICT`);
  window.open(`mailto:${x.email}?subject=${subj}&body=${body}`,"_blank");
  alert("New password emailed to "+x.email+":\n\n"+np);
};
window.viewBio=(id)=>{const u=DB.users.find(z=>z.id===id);const bio=DB.biodata[id]||{};printBioData(u,bio);};

function renderFees(m){
  m.innerHTML = `<section class="panel"><h2>Fee Types</h2>
    <div class="sub">Define fees. Students generate invoices from these on the Fees page.</div>
    <table class="tbl"><thead><tr><th>Name</th><th>Amount (₦)</th><th>Applies to</th><th>Session</th><th></th></tr></thead>
    <tbody>${DB.feetypes.map(f=>`<tr>
      <td>${f.name}</td><td>${f.amount.toLocaleString()}</td><td>${f.applies}</td><td>${f.session}</td>
      <td><button class="btn btn-ghost" style="padding:4px 10px;font-size:12px;color:#b91c1c" onclick='delFee("${f.id}")'>Delete</button></td>
    </tr>`).join("")}</tbody></table>
    <h3 style="margin-top:18px;font-size:15px">Add Fee Type</h3>
    <form id="ff" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:end">
      <div><label>Name</label><input name="name" required/></div>
      <div><label>Amount</label><input name="amount" type="number" required/></div>
      <div><label>Applies (fresh/returning/both)</label><input name="applies" value="both"/></div>
      <div><label>Session</label><input name="session" value="${DB.settings.session}"/></div>
      <button class="btn btn-green">Add</button>
    </form>
  </section>`;
  document.getElementById("ff").onsubmit=(e)=>{
    e.preventDefault(); const d=Object.fromEntries(new FormData(e.target));
    const all = DB.feetypes; all.push({id:"ft_"+Date.now(),name:d.name,amount:+d.amount,applies:d.applies,session:d.session}); DB.feetypes=all;
    render("fees");
  };
}
window.delFee=(id)=>{DB.feetypes=DB.feetypes.filter(f=>f.id!==id);render("fees");};

function renderProgFees(m){
  const fees = DB.settings.facultyFees || {};
  const faculties = Object.keys(fees);
  m.innerHTML = `<section class="panel"><h2>Programme Fees (per Faculty / Semester)</h2>
    <div class="sub">These are the school fees used to generate invoices for each student based on faculty, mode (Full/Part-Time), level (ND/HND) and indigene status (Ondo = indigene).</div>
    <table class="tbl" style="margin-top:10px"><thead><tr>
      <th>Faculty</th>
      <th>Indigene (₦)</th>
      <th>Non-Indigene (₦)</th>
      <th>Part-Time ND (₦)</th>
      <th>Part-Time HND (₦)</th>
    </tr></thead>
    <tbody>${faculties.map(f=>{const r=fees[f]||{};return `<tr data-fac="${f}">
      <td style="font-weight:600">${f}</td>
      <td><input data-k="indigene"     type="number" value="${r.indigene||0}"     style="width:110px;padding:6px;border:1px solid var(--border);border-radius:6px"/></td>
      <td><input data-k="nonIndigene"  type="number" value="${r.nonIndigene||0}"  style="width:110px;padding:6px;border:1px solid var(--border);border-radius:6px"/></td>
      <td><input data-k="pt_nd"        type="number" value="${r.pt_nd||0}"        style="width:110px;padding:6px;border:1px solid var(--border);border-radius:6px"/></td>
      <td><input data-k="pt_hnd"       type="number" value="${r.pt_hnd||0}"       style="width:110px;padding:6px;border:1px solid var(--border);border-radius:6px"/></td>
    </tr>`}).join("")}</tbody></table>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-green" id="pfSave">Save Programme Fees</button>
      <button class="btn btn-ghost" id="pfReset">Reset to Defaults</button>
    </div>
  </section>`;
  document.getElementById("pfSave").onclick=()=>{
    const next = {};
    document.querySelectorAll("tr[data-fac]").forEach(tr=>{
      const fac = tr.dataset.fac; next[fac] = {};
      tr.querySelectorAll("input[data-k]").forEach(inp=>{ next[fac][inp.dataset.k] = +inp.value||0; });
    });
    DB.settings = {...DB.settings, facultyFees: next};
    toast("Programme fees saved."); render("progfees");
  };
  document.getElementById("pfReset").onclick=()=>{
    if(!confirm("Reset all programme fees to defaults?")) return;
    DB.settings = {...DB.settings, facultyFees: JSON.parse(JSON.stringify(DEFAULT_FACULTY_FEES))};
    render("progfees");
  };
}

function renderInvoices(m){
  const inv = DB.invoices; const users = DB.users;
  m.innerHTML = `<section class="panel"><h2>All Invoices</h2>
    <table class="tbl"><thead><tr><th>No.</th><th>Student</th><th>Fee</th><th>Amount</th><th>Date</th><th>Status</th><th></th></tr></thead>
    <tbody>${inv.map(i=>{const u=users.find(x=>x.id===i.userId);return `<tr>
      <td style="font-family:monospace;font-size:12px">${i.id}</td>
      <td>${u?.name||"—"}</td><td>${i.label}</td><td>₦${i.amount.toLocaleString()}</td>
      <td>${new Date(i.createdAt).toLocaleDateString()}</td>
      <td>${pill(i.status)}</td>
      <td>
        ${i.status==='pending'?`<button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick='markPaid("${i.id}")'>Mark Paid</button>`:""}
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick='openInv("${i.id}")'>🖨</button>
      </td></tr>`}).join("")||'<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">No invoices.</td></tr>'}</tbody></table>
  </section>`;
}
window.markPaid=(id)=>{const inv=DB.invoices;const x=inv.find(i=>i.id===id);x.status="paid";x.paidAt=Date.now();DB.invoices=inv;
  // also record a payment
  const pays = DB.payments; pays.push({id:"p_"+Date.now(),userId:x.userId,feeKey:"manual",invoiceId:x.id,amount:x.amount,label:x.label,status:"paid",tx_ref:"MANUAL-"+Date.now(),date:Date.now()});DB.payments=pays;
  render("invoices");};
window.openInv=(id)=>{const i=DB.invoices.find(x=>x.id===id);if(i)printInvoice(i);};

function renderCourses(m){
  m.innerHTML = `<section class="panel"><h2>Course Catalog</h2>
    <table class="tbl"><thead><tr><th>Code</th><th>Title</th><th>Units</th><th>Dept</th><th>Level</th><th>Sem.</th><th>Open</th><th></th></tr></thead>
    <tbody>${DB.courses.map(c=>`<tr>
      <td>${c.code}</td><td>${c.title}</td><td>${c.units}</td><td>${c.dept}</td><td>${c.level}</td><td>${c.semester}</td>
      <td>${c.open?'<span class="status-pill status-paid">OPEN</span>':'<span class="status-pill status-pending">CLOSED</span>'}</td>
      <td>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" onclick='toggleCourse("${c.id}")'>${c.open?"Close":"Open"}</button>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px;color:#b91c1c" onclick='delCourse("${c.id}")'>Delete</button>
      </td></tr>`).join("")}</tbody></table>
    <h3 style="margin-top:18px;font-size:15px">Add Course</h3>
    <form id="cf" style="display:grid;grid-template-columns:repeat(6,1fr) auto;gap:8px;align-items:end">
      <div><label>Code</label><input name="code" required/></div>
      <div><label>Title</label><input name="title" required/></div>
      <div><label>Units</label><input name="units" type="number" value="3" required/></div>
      <div><label>Dept</label><input name="dept" required/></div>
      <div><label>Level</label><input name="level" value="ND I"/></div>
      <div><label>Semester</label><input name="semester" value="First"/></div>
      <button class="btn btn-green">Add</button>
    </form>
  </section>
  <section class="panel"><h2>Registrations</h2>
    <table class="tbl"><thead><tr><th>Student</th><th>Session</th><th>Courses</th><th>Date</th></tr></thead>
    <tbody>${DB.registrations.map(r=>{const u=DB.users.find(x=>x.id===r.userId);return `<tr>
      <td>${u?.name||"—"} <span style="color:var(--muted);font-size:12px">${u?.matric||""}</span></td>
      <td>${r.session}</td>
      <td>${r.courseIds.map(id=>DB.courses.find(c=>c.id===id)?.code||id).join(", ")}</td>
      <td>${new Date(r.at).toLocaleDateString()}</td>
      </tr>`}).join("")||'<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--muted)">No registrations yet.</td></tr>'}</tbody></table>
  </section>`;
  document.getElementById("cf").onsubmit=(e)=>{
    e.preventDefault();const d=Object.fromEntries(new FormData(e.target));
    const all=DB.courses;all.push({id:"c_"+Date.now(),...d,units:+d.units,open:true});DB.courses=all;render("courses");
  };
}
window.toggleCourse=(id)=>{const c=DB.courses;const x=c.find(z=>z.id===id);x.open=!x.open;DB.courses=c;render("courses");};
window.delCourse=(id)=>{DB.courses=DB.courses.filter(c=>c.id!==id);render("courses");};

function renderGallery(m){
  m.innerHTML = `<section class="panel"><h2>Gallery</h2>
    <div class="sub">Upload photos of campus, students, events. Shown publicly on /gallery.html.</div>
    <form id="gf" style="display:flex;gap:10px;align-items:end;flex-wrap:wrap">
      <div><label>Title</label><input name="title"/></div>
      <div><label>Photo</label><input name="file" type="file" accept="image/*" required/></div>
      <button class="btn btn-green">Upload</button>
    </form>
    <div style="margin-top:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">
      ${DB.gallery.map(g=>{const u=g.imgKey?Assets.get(g.imgKey):g.dataUrl;return `<div style="position:relative"><img src="${u||""}" style="width:100%;height:120px;object-fit:cover;border-radius:8px"/><div style="font-size:12px;padding:4px 0">${g.title||""}</div>
      <button class="btn btn-ghost" style="padding:3px 8px;font-size:11px;color:#b91c1c;position:absolute;top:4px;right:4px;background:#fff" onclick='delPic("${g.id}")'>×</button></div>`}).join("")}
    </div>
  </section>
  <section class="panel"><h2>School Anthem</h2>
    <form id="af" style="display:grid;gap:10px">
      <div><label>Audio file (MP3/WAV, max ~4MB)</label><input name="audio" type="file" accept="audio/*"/></div>
      <div><label>Lyrics</label><textarea name="lyrics" rows="8" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font:inherit">${(DB.anthem?.lyrics||"")}</textarea></div>
      <button class="btn btn-green" style="justify-self:start">Save Anthem</button>
      ${DB.anthem ? `<button type="button" class="btn btn-ghost" style="justify-self:start;color:#b91c1c" onclick="if(confirm('Remove anthem?')){ if(DB.anthem?.audioKey) Assets.drop(DB.anthem.audioKey); DB.anthem=null; render('gallery'); }">Remove Anthem</button>` : ""}
    </form>
    ${(function(){ const a=DB.anthem; if(!a) return ""; const url = a.audioKey ? Assets.get(a.audioKey) : a.dataUrl; return url ? `<audio controls src="${url}" style="margin-top:10px;width:100%"></audio>` : ""; })()}
  </section>`;
  document.getElementById("gf").onsubmit=async(e)=>{
    e.preventDefault();const f=e.target;const file=f.file.files[0];if(!file)return;
    const url=await fileToDataURL(file);
    const key = _storeAssetIfNeeded(url, "gal_"+Date.now());
    const all=DB.gallery;all.push({id:"g_"+Date.now(),title:f.title.value,imgKey:key||null,dataUrl:key?null:url});DB.gallery=all;render("gallery");
  };
  document.getElementById("af").onsubmit=async(e)=>{
    e.preventDefault();const f=e.target;const cur=DB.anthem||{};
    if(f.audio.files[0]){
      const fileObj = f.audio.files[0];
      if(fileObj.size > 5*1024*1024){ alert("Audio file too large (max ~5MB). Please use a smaller MP3."); return; }
      const url = await fileToDataURL(fileObj);
      // remove old asset to free quota
      if(cur.audioKey) Assets.drop(cur.audioKey);
      const key = _storeAssetIfNeeded(url, "anthem_"+Date.now());
      if(!key){ alert("Could not save audio (storage full). Try a smaller file or clear browser data."); return; }
      cur.audioKey = key;
      delete cur.dataUrl; // legacy
    }
    cur.lyrics = f.lyrics.value;
    try{ DB.anthem=cur; toast("Anthem saved."); }
    catch(err){ alert("Saving anthem failed: "+err.message); }
    render("gallery");
  };
}
window.delPic=(id)=>{const g=DB.gallery.find(x=>x.id===id); if(g&&g.imgKey) Assets.drop(g.imgKey); DB.gallery=DB.gallery.filter(g=>g.id!==id);render("gallery");};

window.delNotice=(id)=>{DB.notices=DB.notices.filter(n=>n.id!==id);render("notices");};

function renderPayments(m){
  const pays = (DB.payments||[]).filter(p=>p.status==="pending").sort((a,b)=>b.date-a.date);
  m.innerHTML = `<section class="panel"><h2>Pending Bank-Transfer Payments</h2>
    <div class="sub">Click <em>Confirm</em> once you've verified the transfer in the school bank account. Student will be emailed automatically.</div>
    <table class="tbl"><thead><tr><th>Date</th><th>Student</th><th>Fee</th><th>Amount</th><th>Ref</th><th>Name on Account</th><th>Proof</th><th></th></tr></thead>
    <tbody>${pays.map(p=>{const u=DB.users.find(x=>x.id===p.userId)||{};const proof=Assets.get(p.proofKey);return `<tr>
      <td>${new Date(p.date).toLocaleString()}</td>
      <td>${u.name||p.customer?.name||"—"}<div class="sub">${u.email||p.customer?.email||""}</div></td>
      <td>${p.label}</td>
      <td>₦${p.amount.toLocaleString()}</td>
      <td style="font-family:monospace;font-size:12px">${p.reference||p.tx_ref}</td>
      <td>${p.payerName||"—"}<div class="sub">${p.payerPhone||""}</div></td>
      <td>${proof?`<button class="btn btn-ghost" style="padding:4px 10px;font-size:12px" data-proof="${p.id}">View</button>`:'<span class="sub">No proof</span>'}</td>
      <td><button class="btn btn-green" style="padding:4px 10px;font-size:12px" onclick='confirmPay("${p.id}")'>Confirm ✓</button>
          <button class="btn btn-ghost" style="padding:4px 10px;font-size:12px;color:#b91c1c" onclick='rejectPay("${p.id}")'>Reject ✗</button></td>
    </tr>`}).join("")||'<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--muted)">No pending payments.</td></tr>'}</tbody></table>
  </section>`;
  m.querySelectorAll("button[data-proof]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const p = (DB.payments||[]).find(x=>x.id===btn.getAttribute("data-proof"));
      if(p) openProofModal(Assets.get(p.proofKey), "Proof — "+(p.label||"")+" · ₦"+(p.amount||0).toLocaleString());
    });
  });
}
window.confirmPay = (id)=>{ if(adminConfirmPayment(id)){ toast("Payment confirmed ✓ — student notified."); render("payments"); } };
window.rejectPay  = (id)=>{ const r=prompt("Reason for rejection:","Could not verify the transfer."); if(r===null) return; const all=DB.payments;const i=all.findIndex(p=>p.id===id);all[i].status="failed";all[i].rejectReason=r;DB.payments=all;toast("Payment marked failed.");render("payments"); };

function renderSettings(m){

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>Admission Starts</label><input name="admissionStart" type="date" value="${s.admissionStart||""}"/></div>

      <div><label>Home page — New Undergraduate Screening card</label>

      <div><label>Home page — Part-Time Application card</label>

      <div><label>Home page — Returning Student card</label>
        <textarea name="msg_home_returning" rows="3" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font:inherit">${(s.messages||{}).home_returning||""}</textarea></div>
      <div><label>Screening page hero text</label>
        <textarea name="msg_screening_hero" rows="2" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font:inherit">${(s.messages||{}).screening_hero||""}</textarea></div>
      <div><label>Part-Time page hero text</label>
        <textarea name="msg_parttime_hero" rows="2" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font:inherit">${(s.messages||{}).parttime_hero||""}</textarea></div>
      <div><label>Returning Student page hero text</label>
        <textarea name="msg_returning_hero" rows="2" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font:inherit">${(s.messages||{}).returning_hero||""}</textarea></div>

        <textarea name="msg_postutme" rows="2" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font:inherit">${(s.messages||{}).postutme||""}</textarea></div>

// Self-heal: make sure EVERY admitted applicant has their own student account.
// This repairs older data where two applicants were merged into one student.
(async ()=>{
  try{
    let fixed = 0;
    const admittedScrs = (DB.screenings||[]).filter(s=>/Admitted/i.test(s.status||""));
    for(const s of admittedScrs){
      const hasUser = (DB.users||[]).some(u=>u.profile && u.profile.scrId===s.id);
      if(!hasUser){
        try{ await adminApproveScreening(s.id); fixed++; }
        catch(err){ console.warn("Reconcile failed for", s.id, err); }
      }
    }
    if(fixed>0) toast(fixed+" approved applicant(s) restored as student(s).");
  }catch(e){ console.warn("Reconcile skipped:", e); }
  render("overview");
})();

</script>

<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bio Data — Ondo City Polytechnic</title>
<link rel="icon" href="assets/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
</head><body>
<header class="nav"><div class="nav-inner">
<a class="brand" href="index.html"><img src="assets/logo.png" alt="OCPOTECH"/>
<div><div class="b-name">ONDO CITY POLYTECHNIC <span style="font-size:10px;color:#15532a">(OCPOTECH)</span></div><div class="b-tag">STUDENT PORTAL</div></div></a>
<nav class="nav-links"><a href="index.html">Home</a><a href="dashboard.html">Dashboard</a><a href="bio-data.html" class="active">Bio Data</a><a href="courses.html">Courses</a><a href="fees.html">Fees</a></nav>
<div class="nav-actions" data-nav-auth></div>
</div></header>

<div class="dash" style="grid-template-columns:1fr">
<main class="dash-main">
<section class="panel">
  <h2>Post-Admission Bio Data / Student Profile</h2>
  <div class="sub" id="gate"></div>
  <div id="formWrap" style="display:none">
    <form id="bioForm">
      <h3 style="font-size:15px;margin:14px 0 4px">Academic</h3>
      <div class="field-row"><div><label>JAMB No</label><input name="jamb"/></div><div><label>Department</label><input name="department"/></div></div>
      <div class="field-row"><div><label>Category (Fresh / Returning)</label><input name="category"/></div><div><label>Course</label><input name="course"/></div></div>
      <div class="field-row"><div><label>Level</label><input name="level"/></div><div><label>Semester</label><input name="semester"/></div></div>

      <h3 style="font-size:15px;margin:14px 0 4px">Personal</h3>
      <div class="field-row"><div><label>Country</label><input name="country" value="Nigeria"/></div><div><label>State</label><input name="state"/></div></div>
      <div class="field-row"><div><label>LGA</label><input name="lga"/></div><div><label>Address</label><input name="address"/></div></div>
      <div class="field-row"><div><label>Phone</label><input name="phone"/></div><div><label>Email (read-only)</label><input value="" disabled style="background:#f5f5f5"/></div></div>
      <div class="field-row"><div><label>Birth Date</label><input name="dob" type="date"/></div><div><label>Birth Place</label><input name="birthPlace"/></div></div>
      <div class="field-row"><div><label>Gender</label><select name="sex" style="padding:12px;border:1px solid var(--border);border-radius:10px;font:inherit;width:100%"><option value="">Select…</option><option>Male</option><option>Female</option></select></div><div><label>Marital Status</label><input name="marital"/></div></div>
      <div class="field-row"><div><label>Blood Group</label><input name="bloodGroup"/></div><div><label>Genotype</label><input name="genotype"/></div></div>
      <div class="field-row"><div><label>Health Condition</label><input name="health"/></div><div><label>Religion</label><input name="religion"/></div></div>

      <h3 style="font-size:15px;margin:14px 0 4px">Next of Kin / Guardian</h3>
      <div class="field-row"><div><label>Name</label><input name="nokName"/></div><div><label>Relationship</label><input name="nokRel"/></div></div>
      <div class="field-row"><div><label>Phone</label><input name="nokPhone"/></div><div><label>Email</label><input name="nokEmail" type="email"/></div></div>
      <label>Address</label><input name="nokAddress"/>

      <h3 style="font-size:15px;margin:14px 0 4px">Referee 1</h3>
      <div class="field-row"><div><label>Name</label><input name="ref1Name"/></div><div><label>Phone</label><input name="ref1Phone"/></div></div>
      <div class="field-row"><div><label>Email</label><input name="ref1Email" type="email"/></div><div><label>Address</label><input name="ref1Address"/></div></div>

      <h3 style="font-size:15px;margin:14px 0 4px">Referee 2</h3>
      <div class="field-row"><div><label>Name</label><input name="ref2Name"/></div><div><label>Phone</label><input name="ref2Phone"/></div></div>
      <div class="field-row"><div><label>Email</label><input name="ref2Email" type="email"/></div><div><label>Address</label><input name="ref2Address"/></div></div>

      <h3 style="font-size:15px;margin:14px 0 4px">Guarantor</h3>
      <div class="field-row"><div><label>Guarantor Name</label><input name="guarantor_name"/></div><div><label>Relationship</label><input name="guarantor_relationship"/></div></div>
      <div class="field-row"><div><label>Occupation</label><input name="guarantor_occupation"/></div><div><label>Phone</label><input name="guarantor_phone"/></div></div>
      <label>Address</label><input name="guarantor_address"/>


      <h3 style="font-size:15px;margin:14px 0 4px">Uploaded Credentials</h3>
      <div class="field-row"><div><label>Birth Certificate</label><input name="docBirth" type="file" accept="image/*,application/pdf"/></div><div><label>O'Level First Sitting</label><input name="docOlevel" type="file" accept="image/*,application/pdf"/></div></div>
      <div class="field-row"><div><label>Original JAMB Result</label><input name="docJamb" type="file" accept="image/*,application/pdf"/></div><div><label>State of Origin</label><input name="docState" type="file" accept="image/*,application/pdf"/></div></div>
      <div class="field-row"><div><label>Others</label><input name="docOthers" type="file" accept="image/*,application/pdf"/></div><div><label>Passport Photo</label><input name="passport" type="file" accept="image/*"/></div></div>

      <h3 style="font-size:15px;margin:14px 0 4px">Social Media</h3>
      <div class="field-row"><div><label>Facebook</label><input name="facebook"/></div><div><label>Twitter</label><input name="twitter"/></div></div>

      <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-green" type="submit">Save Bio Data</button>
        <button class="btn btn-ghost" type="button" id="printBtn">🖨 Print Bio Data Form</button>
      </div>
    </form>
  </div>
</section>
</main>
</div>

<script src="app.js"></script>
<script src="script.js"></script>
<script>
const me = Auth.require();
const gate = document.getElementById("gate");
const wrap = document.getElementById("formWrap");
if(me){
  const isReturning = me.role === "returning";
  const acceptancePaid = hasPaid(me.id,"acceptance") || DB.invoices.some(i=>i.userId===me.id && /acceptance/i.test(i.label) && i.status==="paid");
  if(!isReturning && !acceptancePaid){
    gate.innerHTML = '<span class="status-pill status-pending">Bio Data locked — Acceptance Fee (₦30,000) must be paid first.</span> <a href="fees.html" class="btn btn-green" style="margin-left:10px">Go to Fees</a>';
  } else {
    gate.innerHTML = `<span class="status-pill status-paid">Unlocked</span> &nbsp; ${me.matric?("Matric: <strong>"+me.matric+"</strong>"):"Matric No: <em>will be assigned by admin after registration</em>"}`;
    wrap.style.display = "block";
    const bio = (DB.biodata[me.id]) || {};
    const f = document.getElementById("bioForm");
    Object.keys(bio).forEach(k=>{ if(f.elements[k] && f.elements[k].type!=="file") f.elements[k].value = bio[k]||""; });
    if(bio.guarantor){ ["name","relationship","occupation","phone","address"].forEach(k=>{ if(f.elements["guarantor_"+k]) f.elements["guarantor_"+k].value = bio.guarantor[k]||""; }); }


    f.addEventListener("submit", async (e)=>{
      e.preventDefault();
      const data = Object.fromEntries(new FormData(f));
      ["docBirth","docOlevel","docJamb","docState","docOthers","passport"].forEach(k=>delete data[k]);
      for(const fld of ["docBirth","docOlevel","docJamb","docState","docOthers","passport"]){
        const file = f.elements[fld].files[0];
        // Compress + store as a small asset key so every student's bio data
        // fits in browser storage (prevents the "only one record saved" issue).
        if(file) data[fld] = await storeImageAsset(file, fld+"_"+me.id);
        else if(bio[fld]) data[fld] = bio[fld];
      }
      data.guarantor = {
        name: data.guarantor_name, relationship: data.guarantor_relationship,
        occupation: data.guarantor_occupation, phone: data.guarantor_phone,
        address: data.guarantor_address
      };
      const all = DB.biodata; all[me.id] = {...bio, ...data}; DB.biodata = all;
      markRegistered(me.id);
      toast("Bio data saved. You are now a Registered Student.");
      setTimeout(()=>location.href="dashboard.html",900);
    });

    document.getElementById("printBtn").addEventListener("click", ()=>{
      const bio = DB.biodata[me.id] || {};
      printBioData(me, bio);
    });
  }
}
</script>
</body></html>
